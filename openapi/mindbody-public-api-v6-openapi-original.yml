          type: boolean
          description: 'When `true`, sends a purchase receipt email to the client. Note that all appropriate permissions and settings must be enabled for the client to receive an email.<br /> Default: **false**'
          example: true
        LocationId:
          type: integer
          format: int32
          description: 'The location ID to be used for pulling business mode prices and taxes. If no location ID is supplied, it defaults to the online store, represented by a null value. Default: **null**
            (the online store)'
          example: 123456
