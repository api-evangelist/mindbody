          type: string
          description: A promotion code, if one applies. Promotion codes are applied to items that are both marked as pay now in a contract and are discounted by the promotion code. If a pay now item 
            is an autopay item, its autopay price is the price at the time of checkout, so, if a promotion code was applied, all autopays are scheduled using that discounted price.
          example: example-value
        PromotionCodes:
          type: array
          items:
            type: string
          description: Promotion codes, if they apply. Promotion codes are applied to items that are both marked as pay now in a contract and are discounted by the promotion code. If a pay now item is
            an autopay item, its autopay price is the price at the time of checkout, so, if a promotion code was applied, all autopays are scheduled using that discounted price.
          example: *id114
        CreditCardInfo:
          $ref: '#/components/schemas/CreditCardInfo'
          description: Contains credit card payment information.<br /> This is only required if `StoredCardInfo` is not passed and both `UseDirectDebit` and `UseAccountCredit` are `false`.
        StoredCardInfo:
          $ref: '#/components/schemas/StoredCardInfo'
          description: Contains information about the stored credit card payment.<br /> This is only required if `CreditCardInfo` is not passed and both `UseDirectDebit` and `UseAccountCredit` and are
            `false`.
        SendNotifications:
          type: boolean
          description: 'When `true`, indicates that email and SMS notifications should be sent to the client after purchase.<br /> Default: **true**'
          example: true
        SalesRepId:
          type: integer
          format: int32
          description: The ID of the staff member to be marked as the sales rep for this contract sale.
          example: 123456
        UseDirectDebit:
          type: boolean
          description: 'When `true`, indicates that the direct debit information stored on the client''s account is to be used to pay for the contract.<br /> This is only required if both `CreditCardInfo`
            and `StoredCardInfo` are not passed and `UseAccountCredit` is false.<br /> Default: **false**'
          example: true
        UseAccountCredit:
          type: boolean
          description: 'When `true`, indicates that the account credit of the client''s account is to be used to pay for the contract.<br /> This is only required if both `CreditCardInfo` and `StoredCardInfo`
            are not passed and `UseDirectDebit` is false. <br /> Default: **false**'
          example: true
        ConsumerPresent:
          type: boolean
          description: When `true`, indicates that the consumer is present or otherwise able to successfully negotiate an SCA challenge. It is not a good idea to have this always be false as that 
            could very likely lead to a bank declining all transactions for the merchant. Defaults to **false**.
          example: true
        PaymentAuthenticationCallbackUrl:
          type: string
          description: The URL consumer is redirected to if the bank requests SCA. This field is only needed if ConsumerPresent is true.
          example: https://example.mindbodyonline.com/resource/abc123
        ProrateDate:
          type: string
          format: date-time
          description: Optional, date to prorate contract
          example: '2026-05-28T14:30:00Z'
