    InitiateCheckoutShoppingCartUsingAlternativePaymentsRequest:
      type: object
      description: Implementation of the 'InitiateCheckoutShoppingCartUsingAlternativePaymentsRequest' model. The API Request model for Initiate Checkout Shopping Cart API.
      properties:
        ClientId:
          type: string
          description: The RSSID of the client making the purchase. A cart can be validated without a client ID, but a client ID must be specified to complete a sale.
          example: example-value
        Items:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutItemWrapper'
          description: A list of the items in the cart.
          example: *id109
        Payments:
          type: array
          items:
            $ref: '#/components/schemas/CheckoutAlternativePaymentInfo'
          description: A list of payment information objects to be applied to payment against the items in the cart.
          example: *id110
        PaymentAuthenticationCallbackUrl:
          type: string
          description: The URL consumer is redirected to after the payment.
          example: https://example.mindbodyonline.com/resource/abc123
        CartId:
          type: string
          description: The unique ID of the shopping cart to be processed. You can use this value to maintain a persistent cart. If you do not specify a cart ID, the MINDBODY software generates one.
          example: example-value
        PayerClientId:
          type: string
          description: The RSSID of the client paying for the purchase. This client needs to have a relationship of type "Pays for" with the client specified in the "ClientId" field.
          example: example-value
        Test:
          type: boolean
          description: 'When `true`, indicates that the contents of the cart are validated, but the transaction does not take place. You should use this parameter during testing and when checking the calculated
            totals of the items in the cart.<br /> When `false`, the transaction takes place and the database is affected.<br /> Default: **false**'
          example: true
        InStore:
          type: boolean
          description: "When `true`, indicates that the cart is to be completed by a staff member and is to take place at one of the business’ physical locations.<br /> When `false`, indicates that the
            cart is to be completed by a client from the business’ online store.<br /> Default: **false**"
          example: true
        CalculateTax:
          type: boolean
          description: 'When `true`, indicates that the tax should be calculated. When `false`, indicates that the tax should not be calculated. Default: **true**'
          example: true
        PromotionCode:
          type: string
          description: Promotion code to be applied to the cart.
          example: example-value
        SendEmail:
          type: boolean
          description: 'When `true`, sends a purchase receipt email to the client. Note that all appropriate permissions and settings must be enabled for the client to receive an email.<br /> Default: **false**'
          example: true
        LocationId:
          type: integer
          format: int32
          description: 'The location ID to be used for pulling business mode prices and taxes. If no location ID is supplied, it defaults to the online store, represented by a null value. Default: **null**
            (the online store)'
          example: 123456
        TransactionIds:
          type: array
          items:
            type: integer
            format: int32
          description: The list of TransactionIds provided with initial response containing SCA Challenge URLs for ConsumerPresent transactions
          example: *id111
        IsBillingPostalCodeRequired:
          type: boolean
          description: the flag to check billing post code is required or not.
          example: true
        EnforceLocationRestrictions:
          type: boolean
          description: 'When `true`, enforces "sell at" location restrictions on the cart items. When `false`, "sell at" location restrictions are not enforced. Default: **false**'
          example: true
    InitiatePurchaseContractRequest:
      type: object
      description: Implementation of the 'InitiatePurchaseContractRequest' model. Request to initiate a purchase contract.
      properties:
        ClientId:
          type: string
          description: "The ID of the client. Note that this is not the same as the client’s unique ID."
          example: example-value
        ContractId:
          type: integer
          format: int32
          description: The ID of the contract being purchased.
          example: 123456
        PaymentMethodId:
          type: integer
          format: int32
          description: 'The type of alternative payment. Possible values are: * 997 - Indicates that the payment method is iDEAL. * 801 - Indicates that the payment method is Apple Pay.'
          example: 123456
        Test:
          type: boolean
          description: 'When `true`, the Public API validates input information, but does not commit it, so no client data is affected.<br /> When `false` or omitted, the transaction is committed, and client
            data is affected.<br /> This endpoint DOES NOT support the `Test` parameter.<br /> Default: **false**'
          example: true
        LocationId:
          type: integer
          format: int32
          description: 'The ID of the location where the client is purchasing the contract; used for AutoPays. If no location ID is supplied, it defaults to the online store, represented by a null value.
            Default: **null** (Online store location)'
          example: 123456
        PromotionCode:
          type: string
          description: A promotion code, if one applies. Promotion codes are applied to items that are both marked as pay now in a contract and are discounted by the promotion code. If a pay now item 
            is an autopay item, its autopay price is the price at the time of checkout, so, if a promotion code was applied, all autopays are scheduled using that discounted price.
          example: example-value
        PromotionCodes:
          type: array
          items:
            type: string
          description: Promotion codes, if they apply. Promotion codes are applied to items that are both marked as pay now in a contract and are discounted by the promotion code. If a pay now item is
            an autopay item, its autopay price is the price at the time of checkout, so, if a promotion code was applied, all autopays are scheduled using that discounted price.
          example: *id112
        SendNotifications:
          type: boolean
          description: 'When `true`, indicates that email and SMS notifications should be sent to the client after purchase.<br /> Default: **true**'
          example: true
        SalesRepId:
          type: integer
          format: int32
          description: The ID of the staff member to be marked as the sales rep for this contract sale.
          example: 123456
        PaymentAuthenticationCallbackUrl:
          type: string
          description: The URL consumer is redirected to after the payment.
          example: https://example.mindbodyonline.com/resource/abc123
