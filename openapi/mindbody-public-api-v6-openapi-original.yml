          type: string
          description: The RSSID of the client making the purchase. A 'ClientId' OR 'UniqueClientId' must be specified to complete a sale.
          example: example-value
        UniqueClientId:
          type: integer
          format: int32
          description: 'The UniqueId of the client making the purchase. A ''ClientId'' OR ''UniqueClientId'' must be specified to complete a sale. Note: you need to provide the ''UniqueClientId'' OR the
            ''ClientId''. If both are provided, the ''UniqueClientId'' takes precedence.'
          example: 123456
        PayerClientId:
          type: string
          description: The RSSID of the client paying for the purchase. This client needs to have a relationship of type "Pays for" with the client specified in the 'ClientId' or 'UniqueClientId' 
            fields.
          example: example-value
        UniquePayerClientId:
          type: integer
          format: int32
          description: 'The UniqueId of the client paying for the purchase. This client needs to have a relationship of type "Pays for" with the client specified in the ''ClientId'' or ''UniqueClientId''
            field. Note: you need to provide the ''UniquePayerClientId'' OR the ''PayerClientId''. If both are provided, the ''UniquePayerClientId'' takes precedence.'
          example: 123456
