components:
  schemas:
    StatusEnum:
      type: string
      description: StatusEnum enumeration.
      enum:
      - None
      - Requested
      - Booked
      - Completed
      - Confirmed
      - Arrived
      - NoShow
      - Cancelled
      - LateCancelled
    BookingWindow:
      type: object
      description: Implementation of the 'BookingWindow' model. The booking window for registration
      properties:
        StartDateTime:
          type: string
          format: date-time
          description: Date and time that the booking window opens; that is, the first day of sales.
          example: '2026-05-28T14:30:00Z'
        EndDateTime:
          type: string
          format: date-time
          description: Date and time that the booking window closes; that is, the last day of sales.
          example: '2026-05-28T14:30:00Z'
        DailyStartTime:
          type: string
          format: date-time
          description: The time that the booking window opens; that is, the time that the store opens.
          example: '2026-05-28T14:30:00Z'
        DailyEndTime:
          type: string
          format: date-time
          description: The time that the booking window closes; that is, the time that the store closes.
          example: '2026-05-28T14:30:00Z'
    PurchasedItem:
      type: object
      description: Implementation of the 'PurchasedItem' model.
      properties:
        SaleDetailId:
          type: integer
          format: int32
          description: The ID which gets assigned to the item when item is added to the cart.
          example: 123456
        Id:
          type: integer
          format: int32
          description: The ID of the purchased item. Use this ID when calling the GET Services or GET Products endpoint.
          example: 123456
        IsService:
          type: boolean
          description: When `true`, indicates that the purchased item was a pricing option for a service.
          example: true
        BarcodeId:
          type: string
          description: The barcode number of the purchased item. Use this ID when calling the GET Products endpoint.
          example: example-value
        Description:
          type: string
          description: The description of the sale transaction/pricing option.
          example: Example note for Mindbody Public API.
        ContractId:
          type: integer
          format: int32
          description: The contract purchased by the client. Use this ID when calling the GET Contract endpoint.
          example: 123456
        CategoryId:
          type: integer
          format: int32
          description: The revenue category ID used for sale. Use this ID when calling the GET Categories endpoint.
          example: 123456
        SubCategoryId:
          type: integer
          format: int32
          description: The ID of revenue subcategory.
          example: 123456
        UnitPrice:
          type: number
          format: double
          description: er Unit Price of the item purchased.
          example: 49.99
        Quantity:
          type: integer
          format: int32
          description: 'Quantity of the purchased item, applicable for products only. Note: Negative numbers indicate returned items.'
          example: 10
        DiscountPercent:
          type: number
          format: double
          description: The percent discount that was applied to the items subtotal.
          example: 1.0
        DiscountAmount:
          type: number
          format: double
          description: The total discount amount that was applied to the items subtotal.
          example: 49.99
        Tax1:
          type: number
          format: double
          description: A decimal representation of the first tax rate that was applied to the items subtotal.
          example: 1.0
        Tax2:
          type: number
          format: double
          description: A decimal representation of the second tax rate that was applied to the items subtotal.
          example: 1.0
        Tax3:
          type: number
          format: double
          description: A decimal representation of the third tax rate that was applied to the items subtotal.
          example: 1.0
        Tax4:
          type: number
          format: double
          description: A decimal representation of the fourth tax rate that was applied to the items subtotal.
          example: 1.0
        Tax5:
          type: number
          format: double
          description: A decimal representation of the fifth tax rate that was applied to the items subtotal.
          example: 1.0
        TaxAmount:
          type: number
          format: double
          description: Total tax amount that is summation of tax1, tax2, tax3, tax4 and tax5.
          example: 49.99
        TotalAmount:
          type: number
          format: double
          description: The items total, once discounts and/or tax was applied.
          example: 49.99
        Notes:
          type: string
          description: Note made by the customer while purchasing item.
          example: Example note for Mindbody Public API.
        Returned:
          type: boolean
          description: When `true`, indicates that the purchased item is returned, `false` otherwise.
          example: true
        PaymentRefId:
          type: integer
          format: int32
          description: The payment reference ID generated during payment of sold item.
          example: 123456
        ExpDate:
          type: string
          format: date-time
          description: The expiration date of the pricing option purchased.
          example: '2026-05-28T14:30:00Z'
        ActiveDate:
          type: string
          format: date-time
          description: The activation date of pricing option purchased.
          example: '2026-05-28T14:30:00Z'
        GiftCardBarcodeId:
          type: string
          description: Gift Card BarcodeId
          example: example-value
    AlternativePaymentMethod:
      type: object
      description: Implementation of the 'AlternativePaymentMethod' model. DTO object for alternative payment methods.
      properties:
        Id:
          type: integer
          format: int32
          description: The ID of the alternative payment method.
          example: 123456
        Name:
          type: string
          description: The name of the alternative payment method.
          example: Sunset Yoga Studio
    ScheduleTypeEnum:
      type: string
      description: ScheduleTypeEnum enumeration.
      enum:
      - All
      - Class
      - Enrollment
      - Appointment
      - Resource
      - Media
      - Arrival
    CompleteCheckoutShoppingCartUsingAlternativePaymentsRequest:
      type: object
      description: Implementation of the 'CompleteCheckoutShoppingCartUsingAlternativePaymentsRequest' model. The API Request model for Complete Checkout Shopping Cart API.
      properties:
        AccessToken:
          type: string
          description: The Access Token generated during Pre-Payment step.
          example: example-value
        ClientId:
          type: string
          description: The RSSID of the client making the purchase. A cart can be validated without a client ID, but a client ID must be specified to complete a sale.
          example: example-value
        Test:
          type: boolean
          description: 'When `true`, indicates that the contents of the cart are validated, but the transaction does not take place. You should use this parameter during testing and when checking the calculated totals of the items in the cart.<br /> When `false`, the transaction takes place and the database is affected.<br /> Default: **false**'
          example: true
    GetServicesResponse:
      type: object
      description: Implementation of the 'GetServicesResponse' model.
      properties:
        PaginationResponse:
          $ref: '#/components/schemas/PaginationResponse'
          description: Contains information about the pagination used.
        Services:
          type: array
          items:
            $ref: '#/components/schemas/Service'
          description: Contains information about the services.
          example:
          - {}
    ResourceAvailability:
      type: object
      description: Implementation of the 'ResourceAvailability' model. An availability of a resource
      properties:
        ResourceId:
          type: integer
          format: int32
          description: Id
          example: 123456
        StartDateTime:
          type: string
          format: date-time
          description: Starts
          example: '2026-05-28T14:30:00Z'
        EndDateTime:
          type: string
          format: date-time
          description: Ends
          example: '2026-05-28T14:30:00Z'
    UpdateProductPriceResponse:
      type: object
      description: Implementation of the 'UpdateProductPriceResponse' model. Update Product Price Response Model
