        schema:
          type: string
          format: date-time
        example: '2026-05-28T14:30:00Z'
      - name: request.ignoreDefaultSessionLength
        in: query
        required: false
        description: When `true`, availabilities that are non-default return, for example, a 30-minute availability with a 60-minute default session length.<br /> When `false`, only availabilities that have the default session length return.
