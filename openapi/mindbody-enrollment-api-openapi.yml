          example: 1
        ResourceId:
          type: integer
          format: int32
          description: The room where the enrollment is taking place.
          example: 123456
        MaxCapacity:
          type: integer
          format: int32
          description: How many people can attend.
          example: 1
        WebCapacity:
          type: integer
          format: int32
          description: 'How many people can signup online. Default: **0**'
