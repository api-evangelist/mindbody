- aid: mindbody:webhooks-api
  name: Mindbody Webhooks API
  description: 'Subscription and delivery platform that pushes near real-time event
    notifications for sites, locations, appointments, classes, clients, sales, and
    staff. Partners manage subscriptions over a REST control plane (POST/GET/PATCH/DELETE
    /api/v1/subscriptions, GET /api/v1/metrics), and Mindbody pushes JSON events with
    HMAC-SHA256 signature verification via the X-Mindbody-Signature header. Base URL:
    https://push-api.mindbodyonline.com.'
  humanURL: https://developers.mindbodyonline.com/WebhooksDocumentation
  baseURL: https://push-api.mindbodyonline.com
