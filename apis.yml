- type: Features
  data:
  - name: Booking and Scheduling
    description: Online booking widgets, class schedules, appointments, enrollments,
      and Pick-a-Spot reservations.
  - name: Point of Sale
    description: In-studio POS for products, services, contracts, gift cards, custom
      payment methods, refunds, and returns.
  - name: Client Management
    description: Client profiles, contracts, services, contact logs, formula notes,
      custom fields, and red/yellow alerts.
  - name: Staff and Payroll
    description: Staff schedules, permissions, availability, class pay, commissions,
      and time-clock reporting.
  - name: Webhooks
    description: HMAC-signed, near real-time delivery of site, location, appointment,
      class, client, sale, and staff events.
  - name: Identity and OAuth
    description: OpenID Connect via signin.mindbodyonline.com with the Mindbody.Api.Public.v6
      scope for delegated calls.
  - name: Cross-Site Lookup
    description: Discover which Mindbody businesses a client is associated with across
      the network.
  - name: Marketplace Listing
    description: Mindbody consumer app marketplace exposes participating studios to
      nearby members.
- type: UseCases
  data:
  - name: Studio Booking Apps
    description: Build branded mobile or web booking experiences for yoga, pilates,
      barre, and fitness studios.
  - name: CRM and Marketing Automation
    description: Sync clients and sales events into CRMs (HubSpot, Salesforce) and
      trigger marketing journeys.
  - name: Wellness Aggregator Integrations
    description: Power class/appointment discovery and booking in third-party wellness
      apps and ClassPass-style platforms.
  - name: Studio Operations Analytics
    description: Pipe payroll, sales, and class fill data into BI tooling for chain
      operators.
  - name: Customer Loyalty Programs
    description: Drive loyalty points and rewards from visit/sale events delivered
      via the Webhooks API.
  - name: Network Identity
    description: Use Cross-Site to recognize repeat clients across affiliated Mindbody
      businesses.
- type: Integrations
  data:
  - name: Mindbody Identity Service
    description: OpenID Connect provider at signin.mindbodyonline.com powering OAuth
      2.0 flows for the Public API.
  - name: Mindbody Marketplace
    description: Consumer app surface exposing participating studios for nearby discovery
      and booking.
  - name: Partner Store
    description: Mindbody-vetted directory of integrations at partnerstore.mindbodyonline.com.
  - name: ClassPass
    description: Aggregator marketplace integrating with Mindbody for class supply.
  - name: Payment Processors
    description: Integrated card processing and custom payment methods routed through
      the Sale endpoints.
- type: Solutions
  data:
  - name: Boutique Fitness
    description: Yoga, pilates, barre, indoor cycling, HIIT, and martial-arts studios.
  - name: Beauty and Salon
    description: Hair, nail, and beauty salons using appointment scheduling and POS.
  - name: Spa and Wellness
    description: Day spas, medspas, and integrative wellness centers.
  - name: Health Clubs and Gyms
    description: Multi-location gyms and health clubs with classes, personal training,
      and recurring memberships.
