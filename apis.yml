aid: mindbody
name: Mindbody
description: Mindbody is a business management and consumer marketplace platform for
  the fitness, beauty, and wellness industries, providing scheduling, point of sale,
  client management, marketing, and reporting tools for studios, gyms, salons, and
  spas. The Mindbody Public API (v6) provides REST endpoints for appointments, classes,
  clients, enrollments, sales, sites, staff, payroll, and cross-site identity, and
  is paired with a Webhooks API that pushes real-time event notifications using API
  key + SiteId headers, with optional OAuth 2.0 bearer tokens from the Mindbody Identity
  Service for staff- and client-scoped operations.
