          in: path
          type: string
          required: true
          description: "The subscription\u2019s ID (a GUID)."
        - name: body
          in: body
          type: object
          required: true
          description: JSON request body.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
