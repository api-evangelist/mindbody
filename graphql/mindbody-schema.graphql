# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  # Sites
  sites(siteIds: [Int!]): [Site!]
  site(siteId: Int!): Site

  # Locations
  locations(siteId: Int!, locationIds: [Int!]): [Location!]

  # Staff
  staffMembers(siteId: Int!, locationId: Int, sessionTypeIds: [Int!]): [StaffMember!]
  staffMember(siteId: Int!, staffId: ID!): StaffMember
  staffAvailability(siteId: Int!, staffIds: [ID!], startDateTime: DateTime!, endDateTime: DateTime!, locationId: Int, sessionTypeId: Int): [StaffAvailability!]

  # Classes
  classes(siteId: Int!, locationIds: [Int!], startDateTime: DateTime!, endDateTime: DateTime!, programIds: [Int!], staffIds: [ID!], limit: Int, offset: Int): [Class!]
  classDescriptions(siteId: Int!, programIds: [Int!], limit: Int, offset: Int): [ClassDescription!]
  classSchedules(siteId: Int!, locationId: Int, programIds: [Int!]): [ClassSchedule!]
  enrollments(siteId: Int!, locationId: Int, programIds: [Int!], startDate: Date, endDate: Date): [Enrollment!]
  waitlist(siteId: Int!, classId: Int!): [Waitlist!]

  # Appointments
  appointments(siteId: Int!, staffIds: [ID!], startDateTime: DateTime!, endDateTime: DateTime!, locationId: Int, clientId: ID, limit: Int, offset: Int): [Appointment!]
  appointment(siteId: Int!, appointmentId: ID!): Appointment
  appointmentAvailability(siteId: Int!, startDateTime: DateTime!, endDateTime: DateTime!, sessionTypeId: Int, locationId: Int, staffIds: [ID!]): [AppointmentAvailability!]
  sessionTypes(siteId: Int!, programIds: [Int!], locationId: Int, onlineOnly: Boolean): [SessionType!]

  # Clients
  clients(siteId: Int!, searchText: String, clientIds: [ID!], limit: Int, offset: Int): [Client!]
  client(siteId: Int!, clientId: ID!): Client
  clientMemberships(siteId: Int!, clientId: ID!): [ClientMembership!]
  clientVisits(siteId: Int!, clientId: ID!, startDateTime: DateTime!, endDateTime: DateTime!, limit: Int, offset: Int): [ClientVisit!]
  clientContactLogs(siteId: Int!, clientId: ID!): [ClientContactLog!]
  clientPurchases(siteId: Int!, clientId: ID!, startDate: Date, endDate: Date): [PurchasedItem!]

  # Sales
  sales(siteId: Int!, clientId: ID, startSaleDateTime: DateTime, endSaleDateTime: DateTime, limit: Int, offset: Int): [Sale!]
  products(siteId: Int!, locationId: Int, onlineSale: Boolean): [Product!]
  pricingOptions(siteId: Int!, sessionTypeId: Int, programId: Int, classId: Int): [PricingOption!]
  giftCards(siteId: Int!, uniqueId: String): [GiftCard!]
  packages(siteId: Int!, locationId: Int, sellOnline: Boolean): [Package!]
  contracts(siteId: Int!, clientId: ID!, limit: Int, offset: Int): [Contract!]
  promoCodes(siteId: Int!): [PromoCode!]

  # Payroll
  staffPayroll(siteId: Int!, staffIds: [ID!], startDate: Date!, endDate: Date!): [PayrollDetail!]

  # Schedule
  scheduleItems(siteId: Int!, locationId: Int, staffIds: [ID!], clientId: ID, startDateTime: DateTime!, endDateTime: DateTime!): Schedule

  # Loyalty
  rewardPrograms(siteId: Int!): [RewardProgram!]
  loyaltyEvents(siteId: Int!, clientId: ID!, limit: Int, offset: Int): [LoyaltyEvent!]

  # Courses
  courses(siteId: Int!, locationId: Int, staffId: ID): [Course!]
}

type Mutation {
  # Class bookings
  bookClass(siteId: Int!, input: BookClassInput!): ClassSignUp
  cancelClassBooking(siteId: Int!, visitId: ID!, lateCancel: Boolean, sendEmail: Boolean, test: Boolean): Boolean

  # Appointment bookings
  bookAppointment(siteId: Int!, input: BookAppointmentInput!): Appointment
  cancelAppointment(siteId: Int!, appointmentId: ID!, lateCancel: Boolean, sendEmail: Boolean, test: Boolean): Boolean
  updateAppointment(siteId: Int!, appointmentId: ID!, notes: String, startDateTime: DateTime, endDateTime: DateTime): Appointment

  # Enrollment
  addClientToEnrollment(siteId: Int!, clientId: ID!, enrollmentId: Int!, waitlist: Boolean, test: Boolean): Registration

  # Client management
  addClient(siteId: Int!, input: AddClientInput!): Client
  updateClient(siteId: Int!, input: UpdateClientInput!): Client
  addClientContactLog(siteId: Int!, input: AddContactLogInput!): ClientContactLog

  # Sales
  checkoutCart(siteId: Int!, input: CheckoutCartInput!): Sale

  # Waitlist
  addToWaitlist(siteId: Int!, classId: Int!, clientId: ID!, sendEmail: Boolean): Waitlist
  removeFromWaitlist(siteId: Int!, waitlistEntryId: ID!): Boolean

  # Gift cards
  issueGiftCard(siteId: Int!, purchasedByClientId: ID!, issuedToClientId: ID!, amount: Decimal!): GiftCard

  # User tokens
  issueUserToken(siteId: Int!, username: String!, password: String!): UserToken
}
