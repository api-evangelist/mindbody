# Mindbody GraphQL Schema
# Conceptual schema derived from Mindbody Public API v6
# Source: https://developers.mindbodyonline.com/PublicDocumentation/V6

scalar DateTime
scalar Date
scalar Time
scalar Decimal
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum BookingStatus {
  BOOKED
  WAITLISTED
  CANCELLED
  LATE_CANCELLED
  COMPLETED
  REQUESTED
}

enum AppointmentStatus {
  BOOKED
  COMPLETED
  CANCELLED
  NO_SHOW
  CONFIRMED
}

enum GenderType {
  MALE
  FEMALE
  NON_BINARY
  PREFER_NOT_TO_SAY
}

enum PaymentMethodType {
  CREDIT_CARD
  CASH
  CHECK
  GIFT_CARD
  CUSTOM
  ACCOUNT_CREDIT
  DIRECT_DEBIT
}

enum PromoCodeType {
  DOLLAR_DISCOUNT
  PERCENTAGE_DISCOUNT
  FREE_SERVICE
}

enum LoyaltyEventType {
  VISIT
  PURCHASE
  REFERRAL
  BIRTHDAY
  MILESTONE
  REDEMPTION
}

enum ScheduleItemType {
  CLASS
  APPOINTMENT
  AVAILABILITY
  RESOURCE
}

# ─────────────────────────────────────────────
# Scalars + Pagination
# ─────────────────────────────────────────────

type PageInfo {
  totalResults: Int!
  offset: Int!
  limit: Int!
}

